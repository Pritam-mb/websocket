<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        #messageContainer {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
            height: 300px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }
        .message {
            padding: 8px;
            margin: 5px 0;
            background-color: white;
            border-radius: 5px;
            border-left: 3px solid #007bff;
        }
        #inputfield {
            width: 70%;
            padding: 8px;
            margin-right: 5px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>chatting</h1>
    <input type="text" id="inputfield" placeholder="Type a message...">
    <button id="sendButton">Send</button>
    <!-- <button id="showAllButton">Show All Messages</button> -->
    <div id="messageContainer"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const messagesArray = [];
        const inputField = document.getElementById('inputfield');
        const sendButton = document.getElementById('sendButton');
        const showAllButton = document.getElementById('showAllButton');
        const messageContainer = document.getElementById('messageContainer');

        // Function to display all messages from the array
        function displayAllMessages() {
            messageContainer.innerHTML = ''; // Clear current display
            messagesArray.forEach((msg, index) => {
                const messageElement = document.createElement('div');
                messageElement.className = 'message';
                messageElement.textContent = `${index + 1}. ${msg}`;
                messageContainer.appendChild(messageElement);
            });
            console.log('All messages in array:', messagesArray);
        }

        sendButton.addEventListener('click', () => {
            const message = inputField.value;
            if (message.trim()) {
                socket.emit('user-message', message);
                inputField.value = '';
            }
        });

        // Send message on Enter key
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendButton.click();
            }
        });

        // Show all messages button
        /* showAllButton.addEventListener('click', () => {
            displayAllMessages();
        }); */

        socket.on("server-message", (data) => {
            messagesArray.push(data);
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            messageElement.textContent = data;
            messageContainer.appendChild(messageElement);
            console.log("Message from server:", data);
            console.log("Total messages in array:", messagesArray.length);
        })
       /* socket.on('connection', () => {
            console.log('Connected to server with ID:', socket.id);
        });

        socket.on('message', (data) => {
            console.log('Message from server:', data);
        });

        // Example of sending a message to the server
        socket.emit('message', 'Hello from client!');*/
    </script>
</body>
</html>
